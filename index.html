<!DOCTYPE html>
<html>
<head>
<title>Cyber Security Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    font-family: Arial;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input, button {
    padding: 10px;
    margin: 5px;
    width: 100%;
}

button {
    background: #22c55e;
    border: none;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #334155;
}

.danger {
    background: #7f1d1d;
}
</style>
</head>

<body>

<div class="container">

<h1>🔐 Cyber Security Dashboard</h1>

<div class="card">
    <h2>Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="msg"></p>
</div>

<div class="card">
    <h2>📊 Stats</h2>
    Total: <span id="total">0</span> |
    Max Attempts: <span id="max">0</span>
</div>

<div class="card">
    <h2>📈 Chart</h2>
    <canvas id="chart"></canvas>
</div>

<div class="card">
    <h2>🌍 Intrusion Logs</h2>
    <table>
        <thead>
            <tr>
                <th>IP</th>
                <th>Location</th>
                <th>Attempts</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody id="logs"></tbody>
    </table>
</div>

</div>

<script>
let chart;

// ✅ FIXED LOGIN FUNCTION
async function login() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;
    let msg = document.getElementById("msg");

    try {
        let res = await fetch("http://127.0.0.1:5000/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ username, password })
        });

        let data = await res.json();
        msg.innerText = data.message;

        msg.style.color = data.message.includes("successful") ? "lightgreen" : "red";

    } catch (error) {
        msg.innerText = "❌ Backend not connected";
        msg.style.color = "red";
    }
}

// ✅ FETCH LOGS
async function fetchLogs(){
    let res = await fetch("http://127.0.0.1:5000/logs");
    let data = await res.json();

    let logs = document.getElementById("logs");
    logs.innerHTML="";

    let chartData=[];

    data.forEach(l=>{
        let row=document.createElement("tr");

        if(l.attempts>=3) row.classList.add("danger");

        row.innerHTML=`
        <td>${l.ip}</td>
        <td>${l.location}</td>
        <td>${l.attempts}</td>
        <td>${l.time}</td>
        `;

        logs.appendChild(row);
        chartData.push(l.attempts);
    });

    updateChart(chartData);
}

// ✅ FETCH STATS
async function fetchStats(){
    let res = await fetch("http://127.0.0.1:5000/stats");
    let data = await res.json();

    document.getElementById("total").innerText = data.total;
    document.getElementById("max").innerText = data.max;
}

// ✅ UPDATE CHART
function updateChart(data){
    let ctx=document.getElementById("chart");

    if(chart) chart.destroy();

    chart=new Chart(ctx,{
        type:"line",
        data:{
            labels:data.map((_,i)=>i+1),
            datasets:[{
                label:"Attack Attempts",
                data:data,
                borderWidth:2
            }]
        }
    });
}

// AUTO REFRESH
setInterval(()=>{
    fetchLogs();
    fetchStats();
},2000);
</script>

</body>
</html>
